name: Backend CI/CD Pipeline Preview

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize]
    paths:
      - 'backend/**'

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Install dependencies
        run: |
            cd backend
            npm install

      - name: Run linter
        run: |
          cd backend
          npm run lint

    #   - name: Run tests
    #     run: |
    #         cd backend
    #         npm test

  security-scan:
      runs-on: ubuntu-latest

      steps:
        - name: Checkout code
          uses: actions/checkout@v6

        - name: Set up Node.js
          uses: actions/setup-node@v6
          with:
            node-version: 24

        - name: Install dependencies
          run: |
            cd backend
            npm install

        - name: Initialize CodeQL
          uses: github/codeql-action/init@v4
          with:
            languages: javascript

        - name: Perform CodeQL Analysis
          uses: github/codeql-action/analyze@v4